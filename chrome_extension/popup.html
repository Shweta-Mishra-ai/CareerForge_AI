<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      background-color: #f8fafc;
      color: #0f172a;
    }
    h3 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    #status {
      font-size: 12px;
      color: #16a34a;
      text-align: center;
      display: none;
    }
    .warning {
      font-size: 11px;
      color: #64748b;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>🎯 CareerForge AI</h3>
  <p style="font-size: 13px;">Open your own LinkedIn profile, then click below to extract your data securely.</p>
  <button id="extractBtn">Extract & Copy Data</button>
  <div id="status">✅ Data copied to clipboard! Paste it into CareerForge AI.</div>
  
  <div class="warning">Works best when viewing your own or a 1st degree connection's full profile page.</div>

  <script src="popup.js"></script>
</body>
</html>
